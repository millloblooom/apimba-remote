name: DNS Failover (Home ↔ GitHub)

on:
  schedule:
    - cron: '0 3 * * *'      # Runs once a day at 3 AM UTC (change if you want)
  workflow_dispatch:         # Lets you test it manually

jobs:
  failover:
    runs-on: ubuntu-latest

    steps:
      - name: Get current home IP from TXT record
        id: homeip
        run: |
          HOME_IP=$(dig +short TXT home-ip.apimba.org | tr -d '"')
          echo "home_ip=$HOME_IP" >> $GITHUB_ENV

      - name: Check if home server is up
        id: health
        run: |
          if curl -f -m 10 --resolve www.apimba.org:443:${{ env.home_ip }} https://www.apimba.org >/dev/null 2>&1; then
            echo "status=up" >> $GITHUB_ENV
            echo "✅ Home server is UP"
          else
            echo "status=down" >> $GITHUB_ENV
            echo "❌ Home server is DOWN"
          fi

      - name: Switch to Home server (if up)
        if: env.status == 'up'
        uses: cloudflare/cloudflare-action@v2
        with:
          command: dns
          api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          type: A
          name: "@"
          content: ${{ env.home_ip }}
          ttl: 300
          proxied: false

      - name: Switch to GitHub Pages (if down) - IP 1
        if: env.status == 'down'
        uses: cloudflare/cloudflare-action@v2
        with:
          command: dns
          api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          type: A
          name: "@"
          content: 185.199.108.153
          ttl: 300
          proxied: false

      - name: Switch to GitHub Pages (if down) - IP 2
        if: env.status == 'down'
        uses: cloudflare/cloudflare-action@v2
        with:
          command: dns
          api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          type: A
          name: "@"
          content: 185.199.109.153
          ttl: 300
          proxied: false

      - name: Switch to GitHub Pages (if down) - IP 3
        if: env.status == 'down'
        uses: cloudflare/cloudflare-action@v2
        with:
          command: dns
          api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          type: A
          name: "@"
          content: 185.199.110.153
          ttl: 300
          proxied: false

      - name: Switch to GitHub Pages (if down) - IP 4
        if: env.status == 'down'
        uses: cloudflare/cloudflare-action@v2
        with:
          command: dns
          api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          type: A
          name: "@"
          content: 185.199.111.153
          ttl: 300
          proxied: false
