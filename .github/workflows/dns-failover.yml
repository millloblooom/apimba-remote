name: DNS Failover (Home ↔ GitHub)

on:
  schedule:
    - cron: '0 */6 * * *'      # Runs every 6 hours (you can change back to once a day later)
  workflow_dispatch:

jobs:
  failover:
    runs-on: ubuntu-latest

    steps:
      - name: Get current home IP from TXT record
        id: homeip
        run: |
          HOME_IP=$(dig +short TXT home-ip.apimba.org | tr -d '"')
          echo "home_ip=$HOME_IP" >> $GITHUB_ENV

      - name: Check if home server is up
        id: health
        run: |
          if curl -f -m 10 --resolve www.apimba.org:80:${{ env.home_ip }} http://www.apimba.org >/dev/null 2>&1; then
            echo "status=up" >> $GITHUB_ENV
            echo "✅ Home server is UP"
          else
            echo "status=down" >> $GITHUB_ENV
            echo "❌ Home server is DOWN"
          fi

      - name: Switch to Home server (if up)
        if: env.status == 'up'
        run: |
          echo "🔄 Switching DNS to home server (${{ env.home_ip }})"
          # Delete any existing GitHub records first
          curl -X DELETE "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/dns_records" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '[{"type":"A","name":"@","content":"185.199.108.153"}]' || true
          # Set home IP for both @ and www
          curl -X PATCH "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/dns_records" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '[{"type":"A","name":"@","content":"'"${{ env.home_ip }}"'","ttl":300,"proxied":false},{"type":"A","name":"www","content":"'"${{ env.home_ip }}"'","ttl":300,"proxied":false}]'

      - name: Switch to GitHub Pages (if down)
        if: env.status == 'down'
        run: |
          echo "🔄 Switching DNS to GitHub Pages"
          for ip in 185.199.108.153 185.199.109.153 185.199.110.153 185.199.111.153; do
            curl -X PATCH "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/dns_records" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              --data '[{"type":"A","name":"@","content":"'"$ip"'","ttl":300,"proxied":false}]'
          done
          # Set www CNAME
          curl -X PATCH "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/dns_records" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '[{"type":"CNAME","name":"www","content":"millloblooom.github.io","ttl":300,"proxied":false}]'
