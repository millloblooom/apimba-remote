name: DNS Failover (Home ↔ GitHub)

on:
  schedule:
    - cron: '0 3 * * *'      # Once per day at 3 AM UTC. Change to '0 */6 * * *' for every 6 hours
  workflow_dispatch:

jobs:
  failover:
    runs-on: ubuntu-latest

    steps:
      - name: Get current home IP from TXT record
        id: homeip
        run: |
          HOME_IP=$(dig +short TXT home-ip.apimba.org | tr -d '"')
          echo "home_ip=$HOME_IP" >> $GITHUB_ENV

      - name: Check if home server is up
        id: health
        run: |
          if curl -f -m 10 --resolve www.apimba.org:80:${{ env.home_ip }} https://www.apimba.org >/dev/null 2>&1; then
            echo "status=up" >> $GITHUB_ENV
            echo "✅ Home server is UP"
          else
            echo "status=down" >> $GITHUB_ENV
            echo "❌ Home server is DOWN"
          fi

      - name: Switch DNS to Home server (if up)
        if: env.status == 'up'
        run: |
          curl -X PATCH "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/dns_records" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '[{"type":"A","name":"@","content":"'"${{ env.home_ip }}"'","ttl":300,"proxied":false}]'

      - name: Switch DNS to GitHub Pages (if down)
        if: env.status == 'down'
        run: |
          for ip in 185.199.108.153 185.199.109.153 185.199.110.153 185.199.111.153; do
            curl -X PATCH "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/dns_records" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              --data '[{"type":"A","name":"@","content":"'"$ip"'","ttl":300,"proxied":false}]'
          done
